name: 🚢 Logistics Alert

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '*/30 * * * *'

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Cache sent articles
        uses: actions/cache@v3
        with:
          path: sent_articles.json
          key: sent-articles
          restore-keys: |
            sent-articles-
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Logistics Monitor
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "🚢 Logistics Alert Started"
          echo "🕐 Current time: $(date)"
          python main.py
      
      - name: Save cache
        uses: actions/cache@v3
        with:
          path: sent_articles.json
          key: sent-articles
