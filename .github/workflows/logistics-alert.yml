name: 🚢 Logistics Alert

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '*/30 * * * *'

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Download sent articles
        uses: actions/download-artifact@v4
        with:
          name: sent-articles
          path: .
        continue-on-error: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Logistics Monitor
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "🚢 Logistics Alert Started"
          echo "🕐 Current time: $(date)"
          echo "🔍 Checking for existing sent_articles.json:"
          ls -la sent_articles.json || echo "❌ No sent_articles.json found"
          if [ -f sent_articles.json ]; then
            echo "📋 sent_articles.json content:"
            cat sent_articles.json
          fi
          python main.py
      
      - name: Upload sent articles
        uses: actions/upload-artifact@v4
        with:
          name: sent-articles
          path: sent_articles.json
          retention-days: 30
