name: Logistics Monitor V2

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install feedparser requests schedule python-dotenv pytz beautifulsoup4
        
    - name: Run Production Monitor with Debug
      env:
        LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
        LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
        LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_USER }}
        GITHUB_ACTIONS: "true"
      run: |
        echo "🤖 Starting production logistics monitor..."
        echo "📧 Email user: $LOGISTICS_EMAIL_USER"
        echo "📧 Email recipient: $LOGISTICS_EMAIL_RECIPIENT"
        
        python -c "
import sys
sys.path.append('.')
from rss_parser import fetch_and_filter_news
from email_notifier import EmailNotifier
import os

print('🧪 Testing production system...')
articles = fetch_and_filter_news()

if articles:
    print(f'📧 Found {len(articles)} articles - sending email')
    
    # Send the email
    notifier = EmailNotifier()
    success = notifier.send_email(articles, os.getenv('LOGISTICS_EMAIL_USER'), os.getenv('LOGISTICS_EMAIL_PASSWORD'))
    
    if success:
        print('✅ Production email sent successfully!')
    else:
        print('❌ Production email failed')
else:
    print('📭 No articles found - no email sent')
    print('✅ System working correctly - no real logistics crises')

print('✅ Production monitor completed')
"
        
    - name: Handle failure
      if: failure()
      run: |
        echo "Logistics monitor failed - check logs above"
