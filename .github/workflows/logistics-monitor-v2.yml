name: 🚢 Global Logistics Alert V2 - UPDATED

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allows manual run
  push:
    branches: [ main ]

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache bust
        run: |
          echo "🔧 CACHE BUST: $(date)"
          echo "🔧 FORCING NEW WORKFLOW RECOGNITION"
          echo "🔧 Node.js 24 compatibility enabled"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Debug Environment
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "🔍 DEBUGGING ENVIRONMENT AND SECRETS"
          echo "=========================================="
          echo "🕐 Current time: $(date)"
          echo "📋 Python version: $(python --version)"
          echo "📋 Working directory: $(pwd)"
          echo "📋 Files in directory:"
          ls -la
          echo ""
          echo "🔐 SECRETS STATUS:"
          echo "LOGISTICS_EMAIL_USER: ${LOGISTICS_EMAIL_USER:+✅ Set} ${LOGISTICS_EMAIL_USER:-❌ Missing}"
          echo "LOGISTICS_EMAIL_PASSWORD: ${LOGISTICS_EMAIL_PASSWORD:+✅ Set} ${LOGISTICS_EMAIL_PASSWORD:-❌ Missing}"
          echo "LOGISTICS_EMAIL_RECIPIENT: ${LOGISTICS_EMAIL_RECIPIENT:+✅ Set} ${LOGISTICS_EMAIL_RECIPIENT:-❌ Missing}"
          echo ""
          echo "📋 EMAIL CREDENTIALS MASKED:"
          echo "User: ${LOGISTICS_EMAIL_USER:0:5}..."
          echo "Password: ${LOGISTICS_EMAIL_PASSWORD:+✅ Set length ${#LOGISTICS_EMAIL_PASSWORD}}"
          echo "Recipient: ${LOGISTICS_EMAIL_RECIPIENT:0:5}..."

      - name: Run Logistics Monitor with Debug
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "🚢 Global Logistics Alert V2 Started"
          echo "🕐 Current time: $(date)"
          echo "🎯 Monitoring ADNOC/Borouge Global Logistics"
          echo "📡 Using RSS feeds for comprehensive coverage"
          echo "🔐 Using GitHub Secrets for email credentials"
          echo ""
          python main.py

      - name: Email System Debug
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "📧 EMAIL SYSTEM DEBUG"
          echo "===================="
          python -c "
from email_notifier import EmailNotifier
import os

print('📋 Email Notifier Debug:')
notifier = EmailNotifier()
print(f'Sender: {notifier.sender}')
print(f'Recipient: {notifier.recipient}')
print(f'SMTP Server: {notifier.smtp_server}')
print(f'SMTP Port: {notifier.smtp_port}')
print(f'Password Set: {bool(notifier.password)}')

# Test with mock article if real articles weren't found
mock_articles = [{
    'title': 'DEBUG TEST: Email System Verification',
    'summary': 'This is a debug test to verify email system is working.',
    'source': 'Debug System',
    'published': '2026-03-14 18:59:00 UTC',
    'category': 'Test'
}]

print('📧 Sending debug test email...')
result = notifier.send_alert(mock_articles)
print(f'📧 Debug email result: {\"✅ Success\" if result else \"❌ Failed\"}')
"

      - name: Log Results
        run: |
          echo "📊 Logistics monitor completed at $(date)"
          echo "🚢 Global Logistics: Monitored and reported"
          echo "📍 Next scan in 30 minutes"
