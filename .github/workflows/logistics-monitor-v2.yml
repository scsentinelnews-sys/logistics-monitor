name: Logistics Monitor V2

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install feedparser requests schedule python-dotenv pytz beautifulsoup4
        
    - name: Run Production Monitor
      env:
        LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
        LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
        LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_USER }}
        GITHUB_ACTIONS: "true"
      run: |
        echo "🤖 Starting production logistics monitor at $(date)"
        echo "📧 Email configured for recipient"
        
        python main.py
        
        echo "✅ Production monitor completed at $(date)"
        
    - name: Log Summary
      run: |
        echo "📊 Summary: Logistics monitor completed successfully"
        echo "📧 Email will be sent only when real logistics intelligence is found"
        echo "🎯 No email = No real logistics crises (correct behavior)"
