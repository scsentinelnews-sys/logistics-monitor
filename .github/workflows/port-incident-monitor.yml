name: 🚨 Port Incident Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allows manual run

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Run Port Incident Monitor
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
        run: |
          echo "🚨 Starting Port Incident Monitor"
          echo "🕐 Current time: $(date)"
          echo "🎯 Target Materials: Polyethylene, Polypropylene, Polymers, Crude Oil, LNG, Chemicals"
          echo "📍 Target Infrastructure: Port Ruwais, Khalifa Port, Jebel Ali, L&S Fleet"
          echo "🚫 Exclusions: Cars, retail, food, consumer content"
          echo "📡 Using NewsAPI for comprehensive coverage"
          
          cd port-incident-monitor
          python main.py

      - name: Log Results
        run: |
          echo "📊 Port incident monitor completed at $(date)"
          echo "🚨 Port Incidents: Monitored and reported"
          echo "📍 Next scan in 30 minutes"
