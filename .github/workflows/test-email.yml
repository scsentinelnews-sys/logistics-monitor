name: Test Email Only

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install feedparser requests python-dotenv pytz beautifulsoup4
        
    - name: Test Email Only
      env:
        LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
        LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
        LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_USER }}
      run: |
        python -c "
import sys
sys.path.append('.')
from email_notifier import EmailNotifier
import os

print('🧪 Testing email only...')
notifier = EmailNotifier()
success = notifier.send_test_email(os.getenv('LOGISTICS_EMAIL_USER'), os.getenv('LOGISTICS_EMAIL_PASSWORD'))

if success:
    print('✅ Test email sent successfully!')
else:
    print('❌ Test email failed')
"
