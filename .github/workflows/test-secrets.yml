name: 🔐 Test GitHub Secrets

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Test GitHub Secrets
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "🔐 TESTING GITHUB SECRETS"
          echo "================================"
          
          echo "📋 SECRETS STATUS:"
          echo "LOGISTICS_EMAIL_USER: ${LOGISTICS_EMAIL_USER:+✅ Set} ${LOGISTICS_EMAIL_USER:-❌ Missing}"
          echo "LOGISTICS_EMAIL_PASSWORD: ${LOGISTICS_EMAIL_PASSWORD:+✅ Set} ${LOGISTICS_EMAIL_PASSWORD:-❌ Missing}"
          echo "LOGISTICS_EMAIL_RECIPIENT: ${LOGISTICS_EMAIL_RECIPIENT:+✅ Set} ${LOGISTICS_EMAIL_RECIPIENT:-❌ Missing}"
          
          echo ""
          echo "📧 EMAIL SYSTEM TEST:"
          python -c "
from email_notifier import EmailNotifier
import os

print('📋 Email Notifier Status:')
notifier = EmailNotifier()
print(f'Sender: {notifier.sender[:5] + \"...\" if notifier.sender else \"❌ Missing\"}')
print(f'Recipient: {notifier.recipient[:5] + \"...\" if notifier.recipient else \"❌ Missing\"}')
print(f'Password: {\"✅ Set\" if notifier.password else \"❌ Missing\"}')

if notifier.sender and notifier.password and notifier.recipient:
    print('✅ All email credentials available from GitHub Secrets')
else:
    print('❌ Missing email credentials')
"

      - name: Test Email with Mock Data
        env:
          LOGISTICS_EMAIL_RECIPIENT: ${{ secrets.LOGISTICS_EMAIL_RECIPIENT }}
          LOGISTICS_EMAIL_USER: ${{ secrets.LOGISTICS_EMAIL_USER }}
          LOGISTICS_EMAIL_PASSWORD: ${{ secrets.LOGISTICS_EMAIL_PASSWORD }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          echo "📧 TESTING EMAIL WITH MOCK DATA"
          python -c "
from email_notifier import EmailNotifier
from datetime import datetime

# Create mock article
mock_articles = [{
    'title': 'TEST: GitHub Secrets Email Test',
    'summary': 'This is a test to verify GitHub Secrets are working for email delivery.',
    'source': 'GitHub Actions Test',
    'published': datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC'),
    'category': 'Test'
}]

# Send test email
notifier = EmailNotifier()
result = notifier.send_alert(mock_articles)
print(f'📧 Email test result: {\"✅ Success\" if result else \"❌ Failed\"}')
"
